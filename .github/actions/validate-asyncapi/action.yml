name: Validate AsyncAPI (Spectral + Copilot)
description: Runs AsyncAPI ruleset with Spectral + semantic audit with Copilot in parallel and comments the PR.

inputs:
  spec_file:
    required: true
    description: Path del archivo AsyncAPI modificado en el PR.
  pr_number:
    required: true
    description: Número de PR.
  pr_author:
    required: false
    default: ""
    description: Autor del PR (compatibilidad con la versión anterior).
  repo:
    required: true
    description: owner/repo del PR.
  github_token:
    required: true
    description: Token para comentar el PR (puede ser GITHUB_TOKEN).
  copilot_token:
    required: false
    default: ""
    description: Token opcional exclusivo para Copilot.
  governance_dir:
    required: true
    description: Ruta local donde ya fue checkouteado el repo de governance.
  copilot_model:
    required: false
    description: Modelo de Copilot para el audit semántico. Definir desde el workflow caller.
  debug:
    required: false
    default: "false"
    description: Habilita logs de debug detallados (true/false).

outputs:
  spectral_errors:
    value: ${{ steps.audit.outputs.spectral_errors }}
  spectral_warnings:
    value: ${{ steps.audit.outputs.spectral_warnings }}
  spectral_failed:
    value: ${{ steps.audit.outputs.spectral_failed }}
  spectral_failed_reason:
    value: ${{ steps.audit.outputs.spectral_failed_reason }}
  copilot_errors:
    value: ${{ steps.audit.outputs.copilot_errors }}
  copilot_warnings:
    value: ${{ steps.audit.outputs.copilot_warnings }}
  copilot_failed:
    value: ${{ steps.audit.outputs.copilot_failed }}
  copilot_failed_reason:
    value: ${{ steps.audit.outputs.copilot_failed_reason }}
  total_errors:
    value: ${{ steps.totals.outputs.total_errors }}
  total_warnings:
    value: ${{ steps.totals.outputs.total_warnings }}
  status:
    value: ${{ steps.totals.outputs.status }}
  infra_failed:
    value: ${{ steps.totals.outputs.infra_failed }}

runs:
  using: composite
  steps:
    - name: Run Spectral + Copilot audit in parallel (AsyncAPI)
      id: audit
      continue-on-error: true
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot_token }}
        GH_TOKEN: ${{ inputs.copilot_token }}
      run: |
        set -euo pipefail

        RULESET="$GOV_DIR/rulesets/asyncapi-rules.yaml"
        PROMPT="$GOV_DIR/prompts/asyncapi-prompt.md"
        SPEC="${{ inputs.spec_file }}"
        SCRIPTS_DIR="$ACTION_PATH/scripts"

        ts() {
          date -u +"%Y-%m-%dT%H:%M:%SZ"
        }

        log_time() {
          echo "[TIME][$(ts)] $*"
        }

        log_size() {
          local file="$1"
          if [[ -f "$file" ]]; then
            local bytes lines
            bytes="$(wc -c < "$file" | tr -d ' ')"
            lines="$(wc -l < "$file" | tr -d ' ')"
            echo "[SIZE][$(ts)] file=$file bytes=$bytes lines=$lines"
          else
            echo "[SIZE][$(ts)] file=$file missing"
          fi
        }

        emit_output_escaped() {
          local key="$1" file="$2" value=""
          value="$(cat "$file" 2>/dev/null || true)"
          value="${value//'%'/'%25'}"
          value="${value//$'\n'/'%0A'}"
          value="${value//$'\r'/'%0D'}"
          echo "${key}=${value}" >> "$GITHUB_OUTPUT"
        }

        log_time "audit.start spec=$SPEC model=${{ inputs.copilot_model }}"

        {
          echo "spectral_errors=0"
          echo "spectral_warnings=0"
          echo "spectral_failed=0"
          echo "spectral_failed_reason="
        } > /tmp/spectral_out.env

        echo "✅ Sin hallazgos." > spectral_render.md
        : > spectral.stderr

        {
          echo "copilot_errors=0"
          echo "copilot_warnings=0"
          echo "copilot_failed=0"
          echo "copilot_failed_reason="
        } > /tmp/copilot_out.env

        {
          echo "copilotErrors: 0"
          echo "copilotWarnings: 0"
          echo "✅ Sin hallazgos semánticos."
        } > copilot.md

        : > copilot_failed_reason.txt

        (
          set -euo pipefail

          _fail_spectral() {
            local failed="$1" errors="${2:-1}" reason="${3:-}"
            {
              echo "spectral_failed=$failed"
              echo "spectral_errors=$errors"
              echo "spectral_warnings=0"
              echo "spectral_failed_reason=$reason"
            } > /tmp/spectral_out.env
            log_time "spectral.fail failed=$failed errors=$errors reason=$reason"
            exit 0
          }

          log_time "spectral.start"

          if [[ ! -f "$RULESET" ]]; then
            echo "[]" > spectral.json
            _fail_spectral 1 1 "Ruleset no encontrado: $RULESET"
          fi

          if [[ ! -s "$SPEC" ]]; then
            echo "[]" > spectral.json
            _fail_spectral 1 1 "Spec inexistente o vacío: $SPEC"
          fi

          if [[ "${{ inputs.debug }}" == "true" ]]; then
            echo "=== Spectral debug ==="
            spectral --version || true
            node --version || true
            echo "RULESET=$RULESET"
            echo "SPEC=$SPEC"
            ls -la "$RULESET" || true
            nl -ba "$RULESET" | sed -n '1,120p' || true
            echo "=== End Spectral debug ==="
          fi

          set +e
          spectral lint "$SPEC" -r "$RULESET" -f json -o spectral.json --quiet 2> spectral.stderr
          EXIT=$?
          set -e

          log_time "spectral.lint.finished exit=$EXIT"
          log_size "spectral.json"
          log_size "spectral.stderr"

          if [[ ! -s spectral.json ]]; then
            echo "[]" > spectral.json
            REASON="Spectral no generó JSON. Exit=$EXIT"
            [[ -s spectral.stderr ]] && REASON="$REASON | $(tail -n 1 spectral.stderr | tr -d '\r')"
            echo "✅ Sin hallazgos." > spectral_render.md
            _fail_spectral 1 1 "$REASON"
          fi

          log_time "spectral.render.begin"
          python3 "$SCRIPTS_DIR/render_spectral.py" \
            --input spectral.json \
            --render spectral_render.md \
            --env spectral_counts.env
          log_time "spectral.render.end"

          log_size "spectral_render.md"
          log_size "spectral_counts.env"

          source spectral_counts.env
          SFAILED="${spectral_failed:-0}"
          SERRORS="${spectral_errors:-0}"
          SWARN="${spectral_warnings:-0}"
          SREASON=""

          if [[ "$SFAILED" == "1" ]]; then
            SREASON="Spectral JSON inválido (infra). Exit=$EXIT"
            [[ -s spectral.stderr ]] && SREASON="$SREASON | $(tail -n 1 spectral.stderr | tr -d '\r')"
          fi

          {
            echo "spectral_failed=$SFAILED"
            echo "spectral_errors=$SERRORS"
            echo "spectral_warnings=$SWARN"
            echo "spectral_failed_reason=$SREASON"
          } > /tmp/spectral_out.env

          log_time "spectral.end failed=$SFAILED errors=$SERRORS warnings=$SWARN"
        ) &
        SPECTRAL_PID=$!

        _fail_copilot() {
          local reason="$1"
          trap - ERR
          {
            echo "copilotErrors: 0"
            echo "copilotWarnings: 0"
            echo "⚠️ Copilot FAILED: ${reason}"
            echo
            echo "Evidencia:"
            echo
            echo '```'
            if [[ -f copilot.norm.md ]]; then
              tail -n 180 copilot.norm.md
            elif [[ -f copilot.raw.md ]]; then
              tail -n 180 copilot.raw.md
            else
              echo "(sin salida disponible)"
            fi
            echo '```'
          } > copilot.md

          {
            echo "copilot_errors=0"
            echo "copilot_warnings=0"
            echo "copilot_failed=1"
            echo "copilot_failed_reason=${reason}"
          } > /tmp/copilot_out.env

          echo "${reason}" > copilot_failed_reason.txt
          log_time "copilot.fail reason=$reason"
        }

        _on_err() {
          local code=$?
          local line="${BASH_LINENO[0]:-unknown}"
          local cmd="${BASH_COMMAND:-unknown}"
          _fail_copilot "Error inesperado (exit=${code}) en línea ${line}: ${cmd}"
        }

        trap _on_err ERR

        if [[ -z "${{ inputs.copilot_token }}" ]]; then
          _fail_copilot "falta copilot_token (infra, PR rechazado)."
        elif [[ ! -s "$SPEC" ]]; then
          _fail_copilot "archivo inexistente o vacío: $SPEC (infra, PR rechazado)."
        else
          log_time "copilot.build_min.begin"
          ruby "$SCRIPTS_DIR/build_asyncapi_min.rb" \
            --input "$SPEC" \
            --output copilot.min.yaml
          log_time "copilot.build_min.end"

          log_size "copilot.min.yaml"

          log_time "copilot.prompt.begin"
          {
            printf '%s\n' '### SYSTEM_CONTRACT'
            cat "$PROMPT"
            printf '\n'
            printf '%s\n' '### INPUT_ASYNCAPI_SPEC_MIN'
            printf '%s\n' '```yaml'
            cat copilot.min.yaml
            printf '%s\n' '```'
            printf '\n'
            printf '%s\n' '- Tu respuesta ES VÁLIDA solo si cumple EXACTAMENTE el formato de las secciones 4 y 5.'
            printf '%s\n' '- Debes iniciar con estas 2 líneas EXACTAS (sin bullets, sin HTML, sin texto previo, sin emojis, sin títulos):'
            printf '%s\n' 'copilotErrors: <número>'
            printf '%s\n' 'copilotWarnings: <número>'
            printf '\n'
            printf '%s\n' '- IMPORTANTE (estabilidad):'
            printf '%s\n' '- Usa `INPUT_ASYNCAPI_SPEC_MIN` como base de recorrido (channels/operations/components) para todo el catálogo de reglas.'
            printf '\n'
            printf '%s\n' '- PROHIBIDO usar viñetas o símbolos tipo "●", "-", "*", "•" fuera de un bloque ```yaml.'
            printf '%s\n' '- Todos los hallazgos DEBEN ir en bloques ```yaml y cada hallazgo debe ser un bloque separado.'
            printf '%s\n' '- No agregues texto fuera del formato. Si no hay hallazgos: imprime solo las 2 líneas y luego "✅ Sin hallazgos semánticos.".'
          } > copilot.prompt.txt
          log_time "copilot.prompt.end"

          log_size "copilot.prompt.txt"

          COP_EXIT=0
          : > copilot.raw.md

          for i in 1 2 3; do
            log_time "copilot.call.begin attempt=$i"
            set +e
            copilot --no-auto-update --model "${{ inputs.copilot_model }}" -p "$(cat copilot.prompt.txt)" -s --stream off > copilot.raw.md 2>&1
            COP_EXIT=$?
            set -e
            log_time "copilot.call.end attempt=$i exit=$COP_EXIT"
            log_size "copilot.raw.md"

            if [[ "$COP_EXIT" -eq 0 ]] && [[ -s copilot.raw.md ]]; then
              break
            fi

            log_time "copilot.retry.sleep attempt=$i seconds=$((i * 3))"
            sleep $((i * 3))
          done

          log_time "copilot.normalize.begin"
          python3 -c "import pathlib; raw = pathlib.Path('copilot.raw.md').read_text(encoding='utf-8', errors='replace').lstrip('\\ufeff').replace('\\u00a0', ' ').replace('\\r', ''); pathlib.Path('copilot.norm.md').write_text(raw, encoding='utf-8')"
          log_time "copilot.normalize.end"

          log_size "copilot.norm.md"

          if [[ ! -s copilot.norm.md ]]; then
            _fail_copilot "salida vacía (infra/insumo)."
          else
            HEAD_ERR="$(head -n 120 copilot.norm.md)"

            if [[ "$COP_EXIT" -ne 0 ]] || echo "$HEAD_ERR" | grep -qiE '(not authenticated|unauthorized|forbidden|rate limit|subscription|COPILOT_GITHUB_TOKEN|^Error:|^Failed:)'; then
              {
                echo "copilotErrors: 0"
                echo "copilotWarnings: 0"
                echo "⚠️ Copilot FAILED: fallo/auth/rate-limit (infra). Evidencia:"
                echo
                echo '```'
                echo "$HEAD_ERR"
                echo '```'
              } > copilot.md

              {
                echo "copilot_errors=0"
                echo "copilot_warnings=0"
                echo "copilot_failed=1"
                echo "copilot_failed_reason=Fallo Copilot/auth/rate-limit (ver copilot.md)"
              } > /tmp/copilot_out.env

              echo "Fallo Copilot/auth/rate-limit (ver copilot.md)" > copilot_failed_reason.txt
              log_time "copilot.auth_or_rate_limit"
            else
              log_time "copilot.parse.begin"
              python3 "$SCRIPTS_DIR/parse_copilot_output.py" \
                --input copilot.norm.md \
                --prompt "$PROMPT" \
                --output-markdown copilot.md \
                --output-env copilot_counts.env \
                --output-reason copilot_failed_reason.txt
              log_time "copilot.parse.end"

              log_size "copilot.md"
              log_size "copilot_counts.env"

              source copilot_counts.env

              {
                echo "copilot_errors=${copilot_errors:-0}"
                echo "copilot_warnings=${copilot_warnings:-0}"
                echo "copilot_failed=${copilot_failed:-0}"
                echo "copilot_failed_reason=$(cat copilot_failed_reason.txt 2>/dev/null || true)"
              } > /tmp/copilot_out.env

              log_time "copilot.end failed=${copilot_failed:-0} errors=${copilot_errors:-0} warnings=${copilot_warnings:-0}"
            fi
          fi
        fi

        log_time "wait.spectral.begin"
        SPEC_BG_EXIT=0
        wait $SPECTRAL_PID || SPEC_BG_EXIT=$?
        log_time "wait.spectral.end exit=$SPEC_BG_EXIT"

        if [[ $SPEC_BG_EXIT -ne 0 ]]; then
          {
            echo "spectral_failed=1"
            echo "spectral_errors=1"
            echo "spectral_warnings=0"
            echo "spectral_failed_reason=Spectral proceso background falló (exit=$SPEC_BG_EXIT)"
          } > /tmp/spectral_out.env
        fi

        log_time "outputs.emit.begin"

        source /tmp/spectral_out.env
        echo "spectral_errors=${spectral_errors:-0}" >> "$GITHUB_OUTPUT"
        echo "spectral_warnings=${spectral_warnings:-0}" >> "$GITHUB_OUTPUT"
        echo "spectral_failed=${spectral_failed:-0}" >> "$GITHUB_OUTPUT"
        printf '%s' "${spectral_failed_reason:-}" > /tmp/spec_reason.txt
        emit_output_escaped "spectral_failed_reason" "/tmp/spec_reason.txt"

        source /tmp/copilot_out.env
        echo "copilot_errors=${copilot_errors:-0}" >> "$GITHUB_OUTPUT"
        echo "copilot_warnings=${copilot_warnings:-0}" >> "$GITHUB_OUTPUT"
        echo "copilot_failed=${copilot_failed:-0}" >> "$GITHUB_OUTPUT"
        printf '%s' "${copilot_failed_reason:-}" > copilot_failed_reason.txt
        emit_output_escaped "copilot_failed_reason" "copilot_failed_reason.txt"

        log_time "outputs.emit.end"
        log_time "audit.end"

    - name: Calculate totals
      id: totals
      shell: bash
      run: |
        set -euo pipefail

        SE="${{ steps.audit.outputs.spectral_errors }}"
        SE="${SE:-0}"
        SW="${{ steps.audit.outputs.spectral_warnings }}"
        SW="${SW:-0}"
        SF="${{ steps.audit.outputs.spectral_failed }}"
        SF="${SF:-0}"

        CE="${{ steps.audit.outputs.copilot_errors }}"
        CE="${CE:-0}"
        CW="${{ steps.audit.outputs.copilot_warnings }}"
        CW="${CW:-0}"
        CF="${{ steps.audit.outputs.copilot_failed }}"
        CF="${CF:-0}"

        TOTAL_ERR=$((SE + CE))
        TOTAL_WAR=$((SW + CW))

        INFRA_FAILED=0
        if [[ "$SF" -eq 1 ]] || [[ "$CF" -eq 1 ]]; then
          INFRA_FAILED=1
        fi

        STATUS="PASS"
        if [[ "$INFRA_FAILED" -eq 1 ]] || [[ "$TOTAL_ERR" -gt 0 ]]; then
          STATUS="FAIL"
        fi

        echo "total_errors=$TOTAL_ERR" >> "$GITHUB_OUTPUT"
        echo "total_warnings=$TOTAL_WAR" >> "$GITHUB_OUTPUT"
        echo "infra_failed=$INFRA_FAILED" >> "$GITHUB_OUTPUT"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"

    - name: Comment PR with Report
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail

        {
          echo "## 🤖 API Technical Audit Report"
          echo "### 🔍 Contexto: ${{ inputs.spec_file }}"
          echo
          echo "### 📊 Métricas"
          echo "| Fuente | Errores 🔴 | Adv 🟡 |"
          echo "| :--- | :---: | :---: |"
          echo "| **Spectral** | ${{ steps.audit.outputs.spectral_errors }} | ${{ steps.audit.outputs.spectral_warnings }} |"
          echo "| **Copilot**  | ${{ steps.audit.outputs.copilot_errors }} | ${{ steps.audit.outputs.copilot_warnings }} |"
          echo "| **TOTAL**    | **${{ steps.totals.outputs.total_errors }}** | **${{ steps.totals.outputs.total_warnings }}** |"
          echo
          echo "### 🔧 Spectral"
          if [[ "${{ steps.audit.outputs.spectral_failed }}" == "1" ]]; then
            echo "⚠️ Fallo infra: \`${{ steps.audit.outputs.spectral_failed_reason }}\`"
          else
            cat spectral_render.md
          fi
          echo
          echo "### 🧠 Copilot"
          if [[ -f copilot.md ]]; then
            cat copilot.md
          else
            echo "copilotErrors: 0"
            echo "copilotWarnings: 0"
            echo "✅ Sin hallazgos semánticos."
          fi
          if [[ "${{ steps.audit.outputs.copilot_failed }}" == "1" ]]; then
            echo "⚠️ Fallo infra: \`${{ steps.audit.outputs.copilot_failed_reason }}\`"
          fi
          echo
          echo "---"
          echo
          if [[ "${{ steps.totals.outputs.status }}" == "PASS" ]]; then
            echo "### ✅ **ESTADO: APROBADO**"
          else
            echo "### ⛔ **ESTADO: RECHAZADO**"
          fi
        } > report_body.md

        gh pr comment "${{ inputs.pr_number }}" --repo "${{ inputs.repo }}" --body-file report_body.md --edit-last \
          || gh pr comment "${{ inputs.pr_number }}" --repo "${{ inputs.repo }}" --body-file report_body.md

    - name: Enforce PR status
      if: always()
      shell: bash
      run: |
        if [[ "${{ steps.totals.outputs.status }}" != "PASS" ]]; then
          exit 1
        fi
